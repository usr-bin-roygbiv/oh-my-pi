name: Roy branch proof

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Exact commit SHA to check out and verify
        required: true
        type: string
      suite:
        description: Fixed proof suite
        required: true
        type: choice
        options:
          - contract
          - check
          - coding-agent-runtime
          - smoke
          - format-patch

permissions:
  contents: read

concurrency:
  group: roy-branch-proof-${{ inputs.target_sha }}-${{ inputs.suite }}
  cancel-in-progress: false

jobs:
  proof:
    name: ${{ inputs.suite }} at ${{ inputs.target_sha }}
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_sha }}
          fetch-depth: 1
      - name: Verify immutable target
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
        shell: bash
        run: |
          if [[ ! "$TARGET_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid target SHA: $TARGET_SHA" >&2
            exit 2
          fi
          actual=$(git rev-parse HEAD)
          echo "target_sha=$TARGET_SHA"
          echo "checked_out_sha=$actual"
          test "$actual" = "$TARGET_SHA"
      - uses: ./.github/actions/bun-install
      - name: Build native addon
        if: inputs.suite != 'check' && inputs.suite != 'format-patch'
        run: bun run build:native
      - name: Focused contribution contract
        if: inputs.suite == 'contract'
        run: bun test packages/coding-agent/test/autoresearch-contribution.test.ts packages/coding-agent/test/agent-session-btw-branch.test.ts packages/coding-agent/test/git-process-config.test.ts
      - name: Workspace type and format checks
        if: inputs.suite == 'check'
        run: bun run ci:check:full
      - name: Format affected TypeScript
        if: inputs.suite == 'format-patch'
        run: bunx biome format --write packages/coding-agent/src/autoresearch/contribution.ts packages/coding-agent/src/autoresearch/helpers.ts packages/coding-agent/src/autoresearch/index.ts packages/coding-agent/src/autoresearch/tools/init-experiment.ts packages/coding-agent/src/autoresearch/tools/log-experiment.ts packages/coding-agent/src/autoresearch/tools/mutation-authorization.ts packages/coding-agent/src/autoresearch/tools/run-experiment.ts packages/coding-agent/src/autoresearch/tools/update-notes.ts packages/coding-agent/src/autoresearch/types.ts packages/coding-agent/src/extensibility/extensions/runner.ts packages/coding-agent/src/extensibility/extensions/types.ts packages/coding-agent/src/session/agent-session.ts packages/coding-agent/src/utils/git.ts packages/coding-agent/test/agent-session-btw-branch.test.ts packages/coding-agent/test/autoresearch-contribution.test.ts packages/coding-agent/test/git-process-config.test.ts
      - name: Capture formatting patch
        if: inputs.suite == 'format-patch'
        run: git diff --binary -- packages/coding-agent/src/autoresearch/contribution.ts packages/coding-agent/src/autoresearch/helpers.ts packages/coding-agent/src/autoresearch/index.ts packages/coding-agent/src/autoresearch/tools/init-experiment.ts packages/coding-agent/src/autoresearch/tools/log-experiment.ts packages/coding-agent/src/autoresearch/tools/mutation-authorization.ts packages/coding-agent/src/autoresearch/tools/run-experiment.ts packages/coding-agent/src/autoresearch/tools/update-notes.ts packages/coding-agent/src/autoresearch/types.ts packages/coding-agent/src/extensibility/extensions/runner.ts packages/coding-agent/src/extensibility/extensions/types.ts packages/coding-agent/src/session/agent-session.ts packages/coding-agent/src/utils/git.ts packages/coding-agent/test/agent-session-btw-branch.test.ts packages/coding-agent/test/autoresearch-contribution.test.ts packages/coding-agent/test/git-process-config.test.ts > /tmp/format.patch
      - name: Upload formatting patch
        if: inputs.suite == 'format-patch'
        uses: actions/upload-artifact@v4
        with:
          name: format-patch-${{ inputs.target_sha }}
          path: /tmp/format.patch
          if-no-files-found: error
          retention-days: 1
      - name: Coding-agent runtime tests
        if: inputs.suite == 'coding-agent-runtime'
        run: bun run ci:test:coding-agent:runtime
      - name: Run CLI smoke
        if: inputs.suite == 'smoke'
        run: bun run ci:test:smoke
