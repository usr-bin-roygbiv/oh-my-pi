name: "ensure cmake"
description: >-
  Ensure cmake (and ninja on Linux) are on PATH for native builds that compile
  bundled C libraries (audiopus_sys builds libopus via CMake; MSVC cross builds
  generate with Ninja). No-op when the runner image already ships them
  (GitHub-hosted images do); self-heals on the omp-kata pods by installing
  pinned binaries into ~/.local.

inputs:
  cmake-version:
    required: false
    default: "4.1.2"
    description: CMake release version installed when cmake is missing
  ninja-version:
    required: false
    default: "1.13.1"
    description: Ninja release version installed when ninja is missing (Linux only)

runs:
  using: composite
  steps:
    - shell: bash
      env:
        CMAKE_VERSION: ${{ inputs.cmake-version }}
        NINJA_VERSION: ${{ inputs.ninja-version }}
      run: |
        set -euo pipefail
        destdir="${HOME}/.local"
        mkdir -p "$destdir"

        if command -v cmake >/dev/null 2>&1 && cmake --version >/dev/null 2>&1; then
          echo "Using preinstalled $(cmake --version | head -n1)"
        else
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  archive="cmake-${CMAKE_VERSION}-linux-x86_64" ;;
            Linux-aarch64) archive="cmake-${CMAKE_VERSION}-linux-aarch64" ;;
            Darwin-*)      archive="cmake-${CMAKE_VERSION}-macos-universal" ;;
            *)
              echo "Unsupported cmake host: $(uname -s)-$(uname -m)" >&2
              exit 1
              ;;
          esac
          rm -rf "${destdir:?}/${archive}"
          curl -fsSL "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/${archive}.tar.gz" -o "${destdir}/cmake.tar.gz"
          tar -xzf "${destdir}/cmake.tar.gz" -C "$destdir"
          rm -f "${destdir}/cmake.tar.gz"
          case "$archive" in
            *macos*) bindir="${destdir}/${archive}/CMake.app/Contents/bin" ;;
            *)       bindir="${destdir}/${archive}/bin" ;;
          esac
          echo "$bindir" >> "$GITHUB_PATH"
          echo "Installed $("${bindir}/cmake" --version | head -n1)"
        fi

        # Ninja is only needed on Linux hosts: cmake-rs generates MSVC cross
        # builds (cargo-xwin) with the Ninja generator. macOS images ship it.
        if [ "$(uname -s)" = "Linux" ] && ! command -v ninja >/dev/null 2>&1; then
          case "$(uname -m)" in
            x86_64)  zip="ninja-linux.zip" ;;
            aarch64) zip="ninja-linux-aarch64.zip" ;;
            *)
              echo "Unsupported ninja host: $(uname -m)" >&2
              exit 1
              ;;
          esac
          bindir="${destdir}/ninja-${NINJA_VERSION}"
          mkdir -p "$bindir"
          curl -fsSL "https://github.com/ninja-build/ninja/releases/download/v${NINJA_VERSION}/${zip}" -o "${bindir}/ninja.zip"
          if command -v unzip >/dev/null 2>&1; then
            unzip -oq "${bindir}/ninja.zip" -d "$bindir"
          elif command -v bsdtar >/dev/null 2>&1; then
            bsdtar -xf "${bindir}/ninja.zip" -C "$bindir"
          else
            python3 -m zipfile -e "${bindir}/ninja.zip" "$bindir"
          fi
          rm -f "${bindir}/ninja.zip"
          chmod +x "${bindir}/ninja"
          echo "$bindir" >> "$GITHUB_PATH"
          echo "Installed ninja $("${bindir}/ninja" --version)"
        fi
